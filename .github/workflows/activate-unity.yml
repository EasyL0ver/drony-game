name: Acquire Unity License (one-time setup)

# Run this manually from the Actions tab to generate a license request file.
# Then follow the steps in the job output to activate your license.
on:
  workflow_dispatch: {}

jobs:
  activate:
    name: Request Unity Activation File
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Request activation file (.alf)
        id: getAlf
        uses: game-ci/unity-request-activation-file@v2

      - name: Upload .alf artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: ${{ steps.getAlf.outputs.filePath }}

      - name: Print next steps
        run: |
          echo "============================================"
          echo "  NEXT STEPS (one-time only)"
          echo "============================================"
          echo ""
          echo "1. Download the .alf artifact from this run"
          echo "2. Go to: https://license.unity3d.com/manual"
          echo "3. Upload the .alf file and download the .ulf"
          echo "4. In your repo, go to Settings > Secrets > Actions"
          echo "5. Create these 3 secrets:"
          echo "   - UNITY_LICENSE  = paste the ENTIRE .ulf file contents"
          echo "   - UNITY_EMAIL    = your Unity account email"
          echo "   - UNITY_PASSWORD = your Unity account password"
          echo ""
          echo "Done! The deploy workflow will work on the next push."
          echo "You can delete this workflow after activation."
          echo "============================================"
